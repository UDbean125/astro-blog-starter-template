<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Save to Harbour</title>
	<style>
		body { margin: 0; padding: 18px; font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Manrope, sans-serif; background: #fdfaf3; color: #10151f; min-width: 280px; }
		h1 { margin: 0 0 12px; font-size: 16px; display: flex; align-items: center; gap: 8px; }
		.dot { width: 28px; height: 28px; background: #0f2547; border-radius: 8px; display:inline-flex;align-items:center;justify-content:center; color: #ff5b3a; font-weight: 800; }
		input { width: 100%; box-sizing: border-box; padding: 8px 10px; border-radius: 8px; border: 2px solid #e7e9f0; font: inherit; margin-bottom: 8px; }
		button { width: 100%; padding: 10px 14px; border: 0; border-radius: 10px; background: #ff5b3a; color: white; font-weight: 700; font-size: 14px; cursor: pointer; }
		button:hover { background: #d43a1c; }
		.row { display: flex; gap: 6px; }
		.row button { flex: 1; }
		.row button.alt { background: transparent; color: #4a546a; border: 2px solid #e7e9f0; }
		label { display: block; font-size: 12px; color: #4a546a; margin: 8px 0 4px; }
		.tip { font-size: 11px; color: #6b7388; margin-top: 12px; }
	</style>
</head>
<body>
	<h1><span class="dot">⚓</span> Save to Harbour</h1>
	<input id="url" type="url" placeholder="URL to save" />
	<input id="tags" type="text" placeholder="Tags (comma separated)" />
	<button id="save">Save now</button>
	<label for="base">Harbour URL</label>
	<input id="base" type="url" placeholder="https://your-harbour.example.com" />
	<p class="tip">Leave blank to use harbour.app, or set your self-hosted URL.</p>
	<script src="popup.js"></script>
</body>
</html>
